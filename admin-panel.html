<!DOCTYPE html>
<html>
<head>
    <title>Fortinet Admin - Dashboard</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: #0a5c4a; }
        .complaints-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .complaint-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #ffc107; }
        .complaint-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .complaint-id { font-weight: bold; color: #0a5c4a; font-family: monospace; }
        .complaint-status { padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-resolved { background: #d4edda; color: #155724; }
        .reply-textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; margin: 10px 0; min-height: 80px; }
        .reply-btn { background: #0a5c4a; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .resolve-btn { background: #28a745; margin-left: 10px; }
        .filter-buttons { margin: 20px; display: flex; gap: 10px; justify-content: center; }
        .filter-btn { padding: 8px 20px; border: none; border-radius: 20px; cursor: pointer; background: #ddd; }
        .filter-btn.active { background: #0a5c4a; color: white; }
        .refresh-btn { background: #17a2b8; color: white; }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>FORTINET Support Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="filter-buttons">
        <button class="filter-btn active" onclick="filterComplaints('all')">All</button>
        <button class="filter-btn" onclick="filterComplaints('Pending')">Pending</button>
        <button class="filter-btn" onclick="filterComplaints('Replied')">Replied</button>
        <button class="filter-btn" onclick="filterComplaints('Resolved')">Resolved</button>
        <button class="filter-btn refresh-btn" onclick="loadComplaints()">🔄 Refresh</button>
    </div>

    <div class="complaints-container" id="complaintsContainer">
        <div class="loading">Loading complaints...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbwcHFcQqsIRYHMN1ymqNPmuhL_biJ-Cdu_1qeiVWRFT8tArHiKzOrMF-ZyXxX540Rn-/exec";

        if (localStorage.getItem('fortinetAdminLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        let allComplaints = [];
        let currentFilter = 'all';

        async function loadComplaints() {
            const container = document.getElementById('complaintsContainer');
            container.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch(`${API_URL}?action=getAll`);
                const data = await response.json();
                
                if (data.complaints) {
                    allComplaints = data.complaints;
                    updateStats();
                    displayComplaints();
                }
            } catch (error) {
                container.innerHTML = '<div class="loading">Error loading complaints</div>';
            }
        }

        function updateStats() {
            const total = allComplaints.length;
            const pending = allComplaints.filter(c => c.Status === 'Pending').length;
            const replied = allComplaints.filter(c => c.Status === 'Replied').length;
            const resolved = allComplaints.filter(c => c.Status === 'Resolved').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${total}</div><div>Total</div></div>
                <div class="stat-card"><div class="stat-number">${pending}</div><div>Pending</div></div>
                <div class="stat-card"><div class="stat-number">${replied}</div><div>Replied</div></div>
                <div class="stat-card"><div class="stat-number">${resolved}</div><div>Resolved</div></div>
            `;
        }

        function displayComplaints() {
            let filtered = allComplaints;
            if (currentFilter !== 'all') {
                filtered = allComplaints.filter(c => c.Status === currentFilter);
            }
            
            const container = document.getElementById('complaintsContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:60px">No complaints</div>';
                return;
            }
            
            container.innerHTML = '';
            filtered.forEach(c => {
                container.innerHTML += `
                    <div class="complaint-card">
                        <div class="complaint-header">
                            <span class="complaint-id">🎫 ${c.ID}</span>
                            <span class="complaint-status status-${c.Status.toLowerCase()}">${c.Status}</span>
                        </div>
                        <p><strong>👤 Customer:</strong> ${c.Name} (${c.Email})</p>
                        <p><strong>📌 Subject:</strong> ${c.Subject}</p>
                        <p><strong>📝 Message:</strong> ${c.Message}</p>
                        ${c.Reply ? `<p><strong>📝 Reply:</strong> ${c.Reply}</p>` : ''}
                        <textarea id="reply-${c.ID}" class="reply-textarea" placeholder="Type your reply..."></textarea>
                        <button class="reply-btn" onclick="sendReply('${c.ID}')">Send Reply</button>
                        ${c.Status !== 'Resolved' ? `<button class="reply-btn resolve-btn" onclick="markResolved('${c.ID}')">Mark Resolved</button>` : ''}
                    </div>
                `;
            });
        }

        async function sendReply(complaintId) {
            const reply = document.getElementById(`reply-${complaintId}`).value.trim();
            if (!reply) return alert('Enter a reply');
            
            await fetch(API_URL, {
                method: "PUT",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: complaintId, reply: reply })
            });
            loadComplaints();
        }

        async function markResolved(complaintId) {
            await fetch(API_URL, {
                method: "PUT",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: complaintId, status: "Resolved" })
            });
            loadComplaints();
        }

        function filterComplaints(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayComplaints();
        }

        function logout() {
            localStorage.removeItem('fortinetAdminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        loadComplaints();
    </script>
</body>
</html>
