<!DOCTYPE html>
<html>
<head>
    <title>Fortinet Support - Submit Complaint</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 span { color: #ffd700; }
        .fortinet-logo .logo { font-size: 48px; background: #0a5c4a; color: white; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin: 0 auto 15px; display: inline-block; }
        .form-card { background: white; border-radius: 20px; padding: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); color: white; padding: 14px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        button:disabled { opacity: 0.5; }
        .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .track-section { margin-top: 30px; padding-top: 30px; border-top: 2px solid #eee; }
        .track-input { display: flex; gap: 10px; margin-top: 15px; }
        .track-input input { flex: 1; }
        .track-input button { width: auto; padding: 12px 20px; }
        .complaint-status { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .reply-box { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .loading { background: #fff3cd; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="fortinet-logo"><div class="logo">F</div></div>
        <h1><span>FORTINET</span> Support</h1>
        <p>Customer Complaint Portal</p>
    </div>

    <div class="form-card">
        <div id="message"></div>
        
        <form id="complaintForm">
            <div class="input-group">
                <label>Full Name *</label>
                <input type="text" id="customerName" required>
            </div>
            <div class="input-group">
                <label>Email *</label>
                <input type="email" id="customerEmail" required>
            </div>
            <div class="input-group">
                <label>Subject *</label>
                <input type="text" id="subject" required>
            </div>
            <div class="input-group">
                <label>Category *</label>
                <select id="category">
                    <option>Technical Issue</option>
                    <option>Billing Problem</option>
                    <option>Feature Request</option>
                    <option>Account Issue</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="input-group">
                <label>Complaint Details *</label>
                <textarea id="messageText" rows="4" required></textarea>
            </div>
            <button type="submit" id="submitBtn">📤 Submit to Fortinet</button>
        </form>

        <div class="track-section">
            <h3>🔍 Track Your Complaint</h3>
            <div class="track-input">
                <input type="text" id="trackingId" placeholder="Enter Complaint ID">
                <button onclick="trackComplaint()">Track</button>
            </div>
            <div id="trackResult"></div>
        </div>
    </div>
</div>

<script>
// REPLACE WITH YOUR GOOGLE APPS SCRIPT URL
const API_URL = "https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbwcHFcQqsIRYHMN1ymqNPmuhL_biJ-Cdu_1qeiVWRFT8tArHiKzOrMF-ZyXxX540Rn-/exec";

function generateId() {
    return "FTNT-" + Date.now() + "-" + Math.random().toString(36).substr(2, 6).toUpperCase();
}

// Submit complaint
document.getElementById("complaintForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const name = document.getElementById("customerName").value.trim();
    const email = document.getElementById("customerEmail").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const category = document.getElementById("category").value;
    const message = document.getElementById("messageText").value.trim();
    
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";
    document.getElementById("message").innerHTML = '<div class="loading">Submitting...</div>';
    
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: name,
                email: email,
                subject: subject,
                category: category,
                message: message
            })
        });
        
        // Since mode is no-cors, we can't read response
        // Generate a local ID for the user
        const localId = generateId();
        
        document.getElementById("message").innerHTML = `
            <div class="success">
                ✅ <strong>Complaint submitted successfully!</strong><br>
                <strong>Your Complaint ID:</strong> ${localId}<br>
                Please save this ID to track your complaint status.<br>
                <small>Fortinet support will respond within 24 hours.</small>
            </div>
        `;
        document.getElementById("complaintForm").reset();
        
    } catch (error) {
        document.getElementById("message").innerHTML = `<div class="error">❌ Error submitting complaint. Please try again.</div>`;
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "📤 Submit to Fortinet";
    }
});

// Track complaint
async function trackComplaint() {
    const id = document.getElementById("trackingId").value.trim();
    if (!id) {
        alert("Please enter your Complaint ID");
        return;
    }
    
    const trackDiv = document.getElementById("trackResult");
    trackDiv.innerHTML = '<div class="loading">🔍 Searching...</div>';
    
    try {
        // Use JSONP to bypass CORS
        const script = document.createElement('script');
        const callbackName = 'jsonpCallback_' + Date.now();
        
        window[callbackName] = function(data) {
            delete window[callbackName];
            document.body.removeChild(script);
            
            if (data.complaint) {
                const c = data.complaint;
                trackDiv.innerHTML = `
                    <div class="complaint-status">
                        <strong>🎫 Complaint ID:</strong> ${c.ID}<br>
                        <strong>👤 Name:</strong> ${c.Name}<br>
                        <strong>📧 Email:</strong> ${c.Email}<br>
                        <strong>📌 Subject:</strong> ${c.Subject}<br>
                        <strong>📝 Message:</strong> ${c.Message}<br>
                        <strong>⚡ Status:</strong> <span style="color: ${c.Status === 'Resolved' ? 'green' : 'orange'}">${c.Status}</span><br>
                        ${c.Reply ? `<div class="reply-box"><strong>📝 Fortinet Response:</strong><br>${c.Reply}</div>` : ''}
                    </div>
                `;
            } else {
                trackDiv.innerHTML = `<div class="error">❌ Complaint not found. Please check your ID.</div>`;
            }
        };
        
        script.src = `${API_URL}?action=getOne&id=${encodeURIComponent(id)}&callback=${callbackName}`;
        document.body.appendChild(script);
        
        setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                trackDiv.innerHTML = `<div class="error">❌ Request timeout. Please try again.</div>`;
            }
        }, 10000);
        
    } catch (error) {
        trackDiv.innerHTML = `<div class="error">❌ Error tracking complaint.</div>`;
    }
}
</script>
</body>
</html>
