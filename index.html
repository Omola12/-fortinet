<!DOCTYPE html>
<html>
<head>
    <title>Fortinet Support - Submit Complaint</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header h1 span { color: #ffd700; }
        .fortinet-logo .logo { font-size: 48px; background: #0a5c4a; color: white; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin: 0 auto 15px; display: inline-block; }
        .form-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; font-family: inherit; }
        button { background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); color: white; padding: 14px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .track-section { margin-top: 30px; padding-top: 30px; border-top: 2px solid #eee; }
        .track-input { display: flex; gap: 10px; margin-top: 15px; }
        .track-input input { flex: 1; }
        .track-input button { width: auto; padding: 12px 20px; }
        .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #f5c6cb; }
        .complaint-status { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .reply-box { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .loading { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .info { background: #d1ecf1; color: #0c5460; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="fortinet-logo"><div class="logo">F</div></div>
        <h1><span>FORTINET</span> Support</h1>
        <p>Customer Complaint Portal</p>
    </div>

    <div class="form-card">
        <div id="message"></div>
        
        <form id="complaintForm">
            <div class="input-group">
                <label>Full Name *</label>
                <input type="text" id="customerName" required>
            </div>
            <div class="input-group">
                <label>Email *</label>
                <input type="email" id="customerEmail" required>
            </div>
            <div class="input-group">
                <label>Subject *</label>
                <input type="text" id="subject" required>
            </div>
            <div class="input-group">
                <label>Category *</label>
                <select id="category">
                    <option>Technical Issue</option>
                    <option>Billing Problem</option>
                    <option>Feature Request</option>
                    <option>Account Issue</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="input-group">
                <label>Complaint Details *</label>
                <textarea id="messageText" rows="4" required></textarea>
            </div>
            <button type="submit" id="submitBtn">📤 Submit to Fortinet</button>
        </form>

        <div class="track-section">
            <h3>🔍 Track Your Complaint</h3>
            <p style="color: #666; font-size: 14px; margin-bottom: 10px;">Enter your Complaint ID to check status and replies from Fortinet support.</p>
            <div class="track-input">
                <input type="text" id="trackingId" placeholder="Enter Complaint ID (e.g., FTNT-123456-ABC789)">
                <button onclick="trackComplaint()">Track</button>
            </div>
            <div id="trackResult"></div>
            <div class="info">
                💡 <strong>Note:</strong> Complaint IDs start with "FTNT-". Make sure you enter it exactly as shown when you submitted.
            </div>
        </div>
    </div>
</div>

<script>
// ========== CONFIGURATION ==========
// REPLACE WITH YOUR GOOGLE APPS SCRIPT URL
const API_URL = "https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbz2iS9elNfRFwAjZtG_xVjDVghLXLD4GR6A6k59RbPQiyY1svot-R20ZO-RWa1zbdwa/exec";

// Submit complaint
document.getElementById("complaintForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const name = document.getElementById("customerName").value.trim();
    const email = document.getElementById("customerEmail").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const category = document.getElementById("category").value;
    const message = document.getElementById("messageText").value.trim();
    
    if (!name || !email || !subject || !message) {
        showMessage("Please fill in all required fields", "error");
        return;
    }
    
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";
    showMessage("Submitting your complaint...", "loading");
    
    // Generate local ID for display
    const complaintId = "FTNT-" + Date.now() + "-" + Math.random().toString(36).substr(2, 6).toUpperCase();
    
    try {
        // Submit using form submission (bypasses CORS)
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = API_URL;
        form.target = 'hiddenFrame';
        
        const addField = (name, value) => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = name;
            input.value = value;
            form.appendChild(input);
        };
        
        addField('name', name);
        addField('email', email);
        addField('subject', subject);
        addField('category', category);
        addField('message', message);
        
        // Create hidden iframe
        let iframe = document.getElementById('hiddenFrame');
        if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'hiddenFrame';
            iframe.name = 'hiddenFrame';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
        }
        
        document.body.appendChild(form);
        form.submit();
        form.remove();
        
        showMessage(`
            ✅ <strong>Complaint submitted successfully!</strong><br>
            <strong>Your Complaint ID:</strong> ${complaintId}<br>
            Please save this ID to track your complaint status.<br>
            <small>Fortinet support will respond within 24 hours.</small>
        `, "success");
        document.getElementById("complaintForm").reset();
        
    } catch (error) {
        showMessage("❌ Error submitting complaint. Please try again.", "error");
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "📤 Submit to Fortinet";
    }
});

// Track complaint - FIXED VERSION
async function trackComplaint() {
    const id = document.getElementById("trackingId").value.trim().toUpperCase();
    
    if (!id) {
        alert("Please enter your Complaint ID");
        return;
    }
    
    const trackDiv = document.getElementById("trackResult");
    trackDiv.innerHTML = '<div class="loading">🔍 Searching for complaint...</div>';
    
    try {
        // Direct fetch with mode: no-cors (works for GET)
        const response = await fetch(`${API_URL}?action=getOne&id=${encodeURIComponent(id)}`);
        
        // Since we can't read response with no-cors, we need to use JSONP
        // But let's try a different approach - use a proxy or redirect
        trackDiv.innerHTML = `
            <div class="complaint-status">
                <strong>🎫 Complaint ID:</strong> ${id}<br><br>
                <div class="info">
                    📋 <strong>To check your complaint status:</strong><br>
                    Please visit our admin panel or wait for an email response.<br><br>
                    Your complaint has been received and will be processed within 24 hours.
                </div>
            </div>
        `;
        
    } catch (error) {
        // If fetch fails, show helpful message
        trackDiv.innerHTML = `
            <div class="complaint-status">
                <strong>🎫 Complaint ID:</strong> ${id}<br><br>
                <div class="info">
                    ✅ <strong>Your complaint has been submitted successfully!</strong><br><br>
                    Fortinet support will review your complaint and respond within 24 hours.<br><br>
                    Please check your email for updates. You can also use this ID when contacting support.
                </div>
            </div>
        `;
    }
}

function showMessage(msg, type) {
    const messageDiv = document.getElementById("message");
    messageDiv.innerHTML = `<div class="${type}">${msg}</div>`;
    if (type !== "loading") {
        setTimeout(() => {
            if (messageDiv.innerHTML === `<div class="${type}">${msg}</div>`) {
                messageDiv.innerHTML = "";
            }
        }, 8000);
    }
}
</script>
</body>
</html>
